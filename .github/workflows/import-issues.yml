name: Import / Update Issues from CSV

on:
  workflow_dispatch:

permissions:
  issues: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  import:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: |
          sudo apt update
          sudo apt install gh -y

      - name: Authenticate GitHub CLI
        run: echo "${{ secrets.PAT_TOKEN }}" | gh auth login --with-token

      - name: Ensure Labels Exist
        run: |
          gh label create Backend --color FF5733 --force || true
          gh label create Frontend --color 33C3FF --force || true
          gh label create DevOps --color 8E44AD --force || true
          gh label create Database --color 2ECC71 --force || true

          gh label create High --color FF0000 --force || true
          gh label create Medium --color F1C40F --force || true
          gh label create Low --color 2ECC71 --force || true

      - name: Ensure Milestones Exist
        run: |
          create_milestone () {
            TITLE=$1
            EXISTS=$(gh api repos/${{ github.repository }}/milestones --jq ".[] | select(.title==\"$TITLE\") | .title")

            if [ -z "$EXISTS" ]; then
              gh api repos/${{ github.repository }}/milestones -f title="$TITLE"
            fi
          }

          create_milestone "Phase 1"
          create_milestone "Phase 2"
          create_milestone "Phase 3"
          create_milestone "Phase 4"

      - name: Remove Duplicate Issues
        run: |
          while IFS=',' read -r Title Description Phase Layer Priority
          do
            if [ "$Title" != "Title" ]; then

              echo "Checking duplicates for: $Title"

              ISSUES=$(gh issue list \
                --search "$Title in:title" \
                --json number,title,createdAt \
                --jq ".[] | select(.title==\"$Title\") | .number")

              COUNT=$(echo "$ISSUES" | wc -l)

              if [ "$COUNT" -gt 1 ]; then
                echo "Duplicate issues found for $Title"

                FIRST=$(echo "$ISSUES" | head -n 1)

                echo "$ISSUES" | tail -n +2 | while read DUP
                do
                  echo "Deleting duplicate issue #$DUP"
                  gh issue delete "$DUP" --yes
                done
              fi

            fi
          done < issues.csv

      - name: Import or Update Issues
        run: |
          while IFS=',' read -r Title Description Phase Layer Priority
          do
            if [ "$Title" != "Title" ]; then

              ISSUE_NUMBER=$(gh issue list \
                --search "$Title in:title" \
                --json number,title \
                --jq ".[] | select(.title==\"$Title\") | .number")

              if [ -z "$ISSUE_NUMBER" ]; then
                echo "Creating issue: $Title"

                BODY="$Description\n\nPhase: $Phase\nLayer: $Layer\nPriority: $Priority"

                gh issue create \
                  --title "$Title" \
                  --body "$BODY" \
                  --label "$Layer" \
                  --label "$Priority" \
                  --milestone "$Phase"

              else
                echo "Updating issue #$ISSUE_NUMBER"

                gh issue edit "$ISSUE_NUMBER" \
                  --add-label "$Layer" \
                  --add-label "$Priority" \
                  --milestone "$Phase"

              fi

            fi
          done < issues.csv
