name: Import / Update Issues from CSV

on:
  workflow_dispatch:

permissions:
  issues: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  import:
    runs-on: ubuntu-latest

    steps:
      # ----------------------------------------
      # Step 1: Checkout repository
      # ----------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------------------
      # Step 2: Install GitHub CLI
      # ----------------------------------------
      - name: Install GitHub CLI
        run: |
          sudo apt update
          sudo apt install gh jq -y

      # ----------------------------------------
      # Step 3: Authenticate with PAT
      # ----------------------------------------
      - name: Authenticate GitHub CLI
        run: echo "${{ secrets.PAT_TOKEN }}" | gh auth login --with-token

      # ----------------------------------------
      # Step 4: Read CSV into array
      # ----------------------------------------
      - name: Read CSV into array
        run: |
          sed -i 's/\r$//' issues.csv  # fix Windows line endings
          mapfile -t LINES < <(tail -n +2 issues.csv)

      # ----------------------------------------
      # Step 5: Create Labels and Milestones
      # ----------------------------------------
      - name: Ensure Labels and Milestones Exist
        run: |
          for LINE in "${LINES[@]}"
          do
            IFS=',' read -r Title Description Phase Module Layer Priority <<< "$LINE"

            # Trim spaces
            Title=$(echo "$Title" | xargs)
            Description=$(echo "$Description" | xargs)
            Phase=$(echo "$Phase" | xargs)
            Module=$(echo "$Module" | xargs)
            Layer=$(echo "$Layer" | xargs)
            Priority=$(echo "$Priority" | xargs)

            # Labels
            for LABEL in "$Layer" "$Priority"
            do
              if [ -n "$LABEL" ]; then
                echo "Ensuring label exists: $LABEL"
                gh label create "$LABEL" --color F29513 --force || true
                sleep 1
              fi
            done

            # Milestones
            if [ -n "$Phase" ]; then
              EXISTS=$(gh api repos/${{ github.repository }}/milestones --paginate --jq ".[] | select(.title==\"$Phase\") | .title")
              if [ -z "$EXISTS" ]; then
                echo "Creating milestone: $Phase"
                gh api repos/${{ github.repository }}/milestones -f title="$Phase" || true
                sleep 1
              fi
            fi
          done

      # ----------------------------------------
      # Step 6: Remove Duplicate Issues
      # ----------------------------------------
      - name: Remove Duplicate Issues
        run: |
          for LINE in "${LINES[@]}"
          do
            IFS=',' read -r Title Description Phase Module Layer Priority <<< "$LINE"
            Title=$(echo "$Title" | xargs)
            echo "Checking duplicates for: $Title"

            ISSUES=$(gh issue list --search "$Title in:title" --json number,title --jq ".[] | select(.title==\"$Title\") | .number")

            COUNT=$(echo "$ISSUES" | wc -l)

            if [ "$COUNT" -gt 1 ]; then
              echo "Duplicate issues found for $Title"
              echo "$ISSUES" | tail -n +2 | while read DUP
              do
                echo "Deleting duplicate issue #$DUP"
                gh issue delete "$DUP" --yes || true
                sleep 1
              done
            fi
          done

      # ----------------------------------------
      # Step 7: Import or Update Issues
      # ----------------------------------------
      - name: Import or Update Issues
        run: |
          for LINE in "${LINES[@]}"
          do
            IFS=',' read -r Title Description Phase Module Layer Priority <<< "$LINE"

            # Trim spaces
            Title=$(echo "$Title" | xargs)
            Description=$(echo "$Description" | xargs)
            Phase=$(echo "$Phase" | xargs)
            Module=$(echo "$Module" | xargs)
            Layer=$(echo "$Layer" | xargs)
            Priority=$(echo "$Priority" | xargs)

            echo "Processing issue: $Title"

            # Get milestone number
            MILESTONE_NUMBER=$(gh api repos/${{ github.repository }}/milestones --jq ".[] | select(.title==\"$Phase\") | .number")
            if [ -z "$MILESTONE_NUMBER" ]; then
              echo "Warning: milestone '$Phase' not found, skipping issue creation"
              continue
            fi

            BODY="$Description\n\nPhase: $Phase\nModule: $Module\nLayer: $Layer\nPriority: $Priority"

            # Check if issue exists
            ISSUE_NUMBER=$(gh issue list --search "$Title in:title" --json number,title --jq ".[] | select(.title==\"$Title\") | .number")

            if [ -z "$ISSUE_NUMBER" ]; then
              echo "Creating issue: $Title"
              gh issue create \
                --title "$Title" \
                --body "$BODY" \
                --label "$Layer" \
                --label "$Priority" \
                --milestone "$MILESTONE_NUMBER" || true
              sleep 1
            else
              echo "Updating issue #$ISSUE_NUMBER"
              gh issue edit "$ISSUE_NUMBER" \
                --add-label "$Layer" \
                --add-label "$Priority" \
                --milestone "$MILESTONE_NUMBER" || true
              sleep 1
            fi
          done
