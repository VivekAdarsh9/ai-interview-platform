name: Import Issues from CSV

on:
  workflow_dispatch:

permissions:
  issues: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  import:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: |
          sudo apt update
          sudo apt install gh -y

      - name: Authenticate GitHub CLI
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Create Labels if not exists
        run: |
          gh label create Backend --color FF5733 --force || true
          gh label create Frontend --color 33C3FF --force || true
          gh label create DevOps --color 8E44AD --force || true
          gh label create Database --color 2ECC71 --force || true

          gh label create High --color FF0000 --force || true
          gh label create Medium --color F1C40F --force || true
          gh label create Low --color2ECC71 --force || true

      - name: Create Milestones
        run: |
          gh api repos/${{ github.repository }}/milestones \
            -f title="Phase 1" || true

          gh api repos/${{ github.repository }}/milestones \
            -f title="Phase 2" || true

          gh api repos/${{ github.repository }}/milestones \
            -f title="Phase 3" || true

      - name: Import Issues
        run: |
          tail -n +2 issues.csv | while IFS=',' read -r Title Description Phase Layer Priority
          do
            echo "Creating issue: $Title"

            gh issue create \
              --title "$Title" \
              --body "$Description

Phase: $Phase
Layer: $Layer
Priority: $Priority" \
              --label "$Layer" \
              --label "$Priority" \
              --milestone "$Phase" \
              || echo "Failed for $Title"

          done
