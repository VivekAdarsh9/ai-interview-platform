name: Import / Update Issues from CSV

on:
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install GitHub CLI and csvkit
        run: |
          sudo apt update
          sudo apt install -y gh jq python3-pip
          pip3 install csvkit

      - name: Authenticate GitHub CLI
        run: echo "${{ secrets.PAT_TOKEN }}" | gh auth login --with-token

      - name: Convert CSV to JSON
        run: csvjson issues.csv > issues.json

      - name: Ensure Labels Exist
        run: |
          jq -r '.[] | [.Layer, .Priority] | @tsv' issues.json | tr '\t' '\n' | sort -u | while read LABEL; do
            if [ -n "$LABEL" ] && [ "$LABEL" != "null" ]; then
              echo "Creating label: $LABEL"
              gh label create "$LABEL" --color F29513 --force || true
            fi
          done

      - name: Ensure Milestones Exist
        run: |
          jq -r '.[] | .Phase' issues.json | sort -u | while read PHASE; do
            if [ -n "$PHASE" ] && [ "$PHASE" != "null" ]; then
              EXISTS=$(gh api repos/${{ github.repository }}/milestones --paginate --jq ".[] | select(.title==\"$PHASE\") | .title")
              if [ -z "$EXISTS" ]; then
                echo "Creating milestone: $PHASE"
                gh api repos/${{ github.repository }}/milestones -f title="$PHASE"
              fi
            fi
          done

      - name: Build Milestone Map
        id: milestones
        run: |
          echo "::group::Fetching milestone numbers"
          gh api repos/${{ github.repository }}/milestones --paginate --jq '.[] | {title: .title, number: .number}' > all_milestones.json
          cat all_milestones.json
          echo "::endgroup::"

      - name: Create or Update Issues
        run: |
          # Build milestone lookup
          declare -A MILESTONE_MAP
          for row in $(jq -c '.[]' all_milestones.json); do
            title=$(echo $row | jq -r '.title')
            number=$(echo $row | jq -r '.number')
            MILESTONE_MAP["$title"]=$number
          done

          # Loop through CSV issues
          jq -c '.[]' issues.json | while read ISSUE; do
            Title=$(echo "$ISSUE" | jq -r '.Title')
            Description=$(echo "$ISSUE" | jq -r '.Description')
            Phase=$(echo "$ISSUE" | jq -r '.Phase')
            Module=$(echo "$ISSUE" | jq -r '.Module')
            Layer=$(echo "$ISSUE" | jq -r '.Layer')
            Priority=$(echo "$ISSUE" | jq -r '.Priority')

            BODY="### Module: $Module\n\n$Description\n\n**Phase:** $Phase\n**Layer:** $Layer\n**Priority:** $Priority"

            MILESTONE_NUMBER=${MILESTONE_MAP["$Phase"]}

            # Check if issue already exists
            ISSUE_NUMBER=$(gh api repos/${{ github.repository }}/issues --jq ".[] | select(.title==\"$Title\") | .number")

            if [ -z "$ISSUE_NUMBER" ]; then
              echo "Creating issue: $Title"
              CMD="gh issue create --title \"$Title\" --body \"$BODY\""
              [ -n "$Layer" ] && [ "$Layer" != "null" ] && CMD="$CMD --label \"$Layer\""
              [ -n "$Priority" ] && [ "$Priority" != "null" ] && CMD="$CMD --label \"$Priority\""
              [ -n "$MILESTONE_NUMBER" ] && CMD="$CMD --milestone $MILESTONE_NUMBER"
              eval $CMD
            else
              echo "Updating issue #$ISSUE_NUMBER"
              CMD="gh issue edit $ISSUE_NUMBER"
              [ -n "$Layer" ] && [ "$Layer" != "null" ] && CMD="$CMD --add-label \"$Layer\""
              [ -n "$Priority" ] && [ "$Priority" != "null" ] && CMD="$CMD --add-label \"$Priority\""
              [ -n "$MILESTONE_NUMBER" ] && CMD="$CMD --milestone $MILESTONE_NUMBER"
              eval $CMD
            fi

            sleep 1
          done
