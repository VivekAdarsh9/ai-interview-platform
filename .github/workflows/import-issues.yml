name: Import / Update Issues from CSV

on:
  workflow_dispatch:

permissions:
  issues: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  import:
    runs-on: ubuntu-latest

    steps:
      # -------------------------------
      # Checkout repo
      # -------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------------
      # Install dependencies
      # -------------------------------
      - name: Install GitHub CLI, jq, csvkit
        run: |
          sudo apt update
          sudo apt install -y gh jq python3-pip
          pip3 install csvkit

      # -------------------------------
      # Authenticate GitHub CLI
      # -------------------------------
      - name: Authenticate GitHub CLI
        run: echo "${{ secrets.PAT_TOKEN }}" | gh auth login --with-token

      # -------------------------------
      # Convert CSV to JSON (handles commas inside quotes)
      # -------------------------------
      - name: Convert CSV to JSON
        run: |
          sed -i 's/\r$//' issues.csv   # fix Windows line endings
          csvjson issues.csv > issues.json

      # -------------------------------
      # Create missing labels and milestones
      # -------------------------------
      - name: Create Labels and Milestones
        run: |
          jq -c '.[]' issues.json | while read ISSUE; do
            Layer=$(echo "$ISSUE" | jq -r '.Layer')
            Priority=$(echo "$ISSUE" | jq -r '.Priority')
            Phase=$(echo "$ISSUE" | jq -r '.Phase')

            # Create labels if not empty
            for LABEL in "$Layer" "$Priority"; do
              if [ -n "$LABEL" ] && [ "$LABEL" != "null" ]; then
                gh label create "$LABEL" --color F29513 --force || true
                sleep 1
              fi
            done

            # Create milestones if not empty and not exist
            if [ -n "$Phase" ] && [ "$Phase" != "null" ]; then
              EXISTS=$(gh api repos/${{ github.repository }}/milestones --paginate \
                --jq ".[] | select(.title==\"$Phase\") | .title")
              if [ -z "$EXISTS" ]; then
                echo "Creating milestone: $Phase"
                gh api repos/${{ github.repository }}/milestones -f title="$Phase" || true
                sleep 1
              fi
            fi
          done

      # -------------------------------
      # Build milestone lookup map
      # -------------------------------
      - name: Build milestone map
        run: |
          gh api repos/${{ github.repository }}/milestones --paginate > all_milestones.json

          # Save map to file: "TITLE=NUMBER" per line
          jq -r '.[] | "\(.title)=\(.number)"' all_milestones.json > milestone_map.txt

          echo "Milestone map:"
          cat milestone_map.txt

      # -------------------------------
      # Remove duplicate issues (keep oldest)
      # -------------------------------
      - name: Remove Duplicate Issues
        run: |
          jq -c '.[]' issues.json | while read ISSUE; do
            Title=$(echo "$ISSUE" | jq -r '.Title')
            echo "Checking duplicates for: $Title"

            # List all open issues with exact title, sorted oldest first
            ISSUES=$(gh api repos/${{ github.repository }}/issues \
              --jq "[.[] | select(.title==\"$Title\") | .number] | sort | .[]")

            COUNT=$(echo "$ISSUES" | grep -c '[0-9]' || true)

            if [ "$COUNT" -gt 1 ]; then
              echo "Duplicate issues found for: $Title"
              # Keep the first (oldest), delete the rest
              echo "$ISSUES" | tail -n +2 | while read DUP; do
                echo "Deleting duplicate issue #$DUP"
                gh issue delete "$DUP" --yes || true
                sleep 1
              done
            fi
          done

      # -------------------------------
      # Create or Update Issues
      # -------------------------------
      - name: Create or Update Issues
        run: |
          # Load milestone map into associative array
          declare -A MILESTONE_MAP
          while IFS='=' read -r TITLE NUMBER; do
            MILESTONE_MAP["$TITLE"]=$NUMBER
          done < milestone_map.txt

          jq -c '.[]' issues.json | while read ISSUE; do
            Title=$(echo "$ISSUE" | jq -r '.Title')
            Description=$(echo "$ISSUE" | jq -r '.Description')
            Phase=$(echo "$ISSUE" | jq -r '.Phase')
            Module=$(echo "$ISSUE" | jq -r '.Module')
            Layer=$(echo "$ISSUE" | jq -r '.Layer')
            Priority=$(echo "$ISSUE" | jq -r '.Priority')

            BODY="### Module: $Module\n\n$Description\n\n**Phase:** $Phase\n**Layer:** $Layer\n**Priority:** $Priority"

            MILESTONE_NUMBER=${MILESTONE_MAP["$Phase"]}

            # Check if issue already exists
            ISSUE_NUMBER=$(gh api repos/${{ github.repository }}/issues \
              --jq ".[] | select(.title==\"$Title\") | .number" | head -n 1)

            if [ -z "$ISSUE_NUMBER" ]; then
              echo "Creating issue: $Title"
              gh issue create \
                --title "$Title" \
                --body "$(printf "$BODY")" \
                --label "$Layer" \
                --label "$Priority" \
                --milestone "$MILESTONE_NUMBER" || true
              sleep 1
            else
              echo "Updating issue #$ISSUE_NUMBER: $Title"
              gh issue edit "$ISSUE_NUMBER" \
                --add-label "$Layer" \
                --add-label "$Priority" \
                --milestone "$MILESTONE_NUMBER" || true
              sleep 1
            fi
          done
