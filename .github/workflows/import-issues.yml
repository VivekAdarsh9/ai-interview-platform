name: Import / Update Issues from CSV

on:
  workflow_dispatch:

permissions:
  issues: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  import:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: |
          sudo apt update
          sudo apt install gh -y

      - name: Authenticate GitHub CLI
        run: echo "${{ secrets.PAT_TOKEN }}" | gh auth login --with-token

      # ------------------------------------------------
      # Read CSV into Bash array
      # ------------------------------------------------
      - name: Read CSV
        run: |
          # Fix Windows line endings
          sed -i 's/\r$//' issues.csv
          mapfile -t LINES < <(tail -n +2 issues.csv)

      # ------------------------------------------------
      # Cache existing milestones and labels
      # ------------------------------------------------
      - name: Cache Milestones and Labels
        run: |
          EXISTING_MILESTONES=$(gh api repos/${{ github.repository }}/milestones --paginate --jq '.[].title')
          EXISTING_LABELS=$(gh label list --json name --jq '.[].name')
          echo "$EXISTING_MILESTONES" > milestones.txt
          echo "$EXISTING_LABELS" > labels.txt

      # ------------------------------------------------
      # Create Labels and Milestones
      # ------------------------------------------------
      - name: Ensure Labels and Milestones Exist
        run: |
          for LINE in "${LINES[@]}"
          do
            IFS=',' read -r Title Description Phase Layer Priority <<< "$LINE"

            # Labels
            for LABEL in "$Layer" "$Priority"
            do
              if ! grep -Fxq "$LABEL" labels.txt; then
                echo "Creating label: $LABEL"
                gh label create "$LABEL" --color F29513 --force || true
                labels.txt+=("$LABEL")
                sleep 1
              fi
            done

            # Milestones
            if ! grep -Fxq "$Phase" milestones.txt; then
              echo "Creating milestone: $Phase"
              gh api repos/${{ github.repository }}/milestones -f title="$Phase"
              milestones.txt+=("$Phase")
              sleep 1
            fi
          done

      # ------------------------------------------------
      # Remove Duplicate Issues
      # ------------------------------------------------
      - name: Remove Duplicate Issues
        run: |
          for LINE in "${LINES[@]}"
          do
            IFS=',' read -r Title Description Phase Layer Priority <<< "$LINE"
            echo "Checking duplicates for: $Title"

            ISSUES=$(gh issue list --search "$Title in:title" --json number,title --jq ".[] | select(.title==\"$Title\") | .number")

            COUNT=$(echo "$ISSUES" | wc -l)

            if [ "$COUNT" -gt 1 ]; then
              echo "Duplicate issues found for $Title"

              echo "$ISSUES" | tail -n +2 | while read DUP
              do
                echo "Deleting duplicate issue #$DUP"
                gh issue delete "$DUP" --yes
                sleep 1
              done
            fi
          done

      # ------------------------------------------------
      # Create or Update Issues
      # ------------------------------------------------
      - name: Import or Update Issues
        run: |
          for LINE in "${LINES[@]}"
          do
            IFS=',' read -r Title Description Phase Layer Priority <<< "$LINE"
            echo "Processing: $Title"

            ISSUE_NUMBER=$(gh issue list --search "$Title in:title" --json number,title --jq ".[] | select(.title==\"$Title\") | .number")

            BODY="$Description\n\nPhase: $Phase\nLayer: $Layer\nPriority: $Priority"

            if [ -z "$ISSUE_NUMBER" ]; then
              echo "Creating issue: $Title"
              gh issue create --title "$Title" --body "$BODY" --label "$Layer" --label "$Priority" --milestone "$Phase"
              sleep 1
            else
              echo "Updating issue #$ISSUE_NUMBER"
              gh issue edit "$ISSUE_NUMBER" --add-label "$Layer" --add-label "$Priority" --milestone "$Phase"
              sleep 1
            fi
          done
