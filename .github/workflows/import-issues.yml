name: Import / Update Issues from CSV

on:
  workflow_dispatch:

permissions:
  issues: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: |
          sudo apt update
          sudo apt install gh jq -y

      - name: Authenticate GitHub CLI
        run: echo "${{ secrets.PAT_TOKEN }}" | gh auth login --with-token

      - name: Parse CSV and Create Labels/Milestones
        run: |
          # fix Windows line endings
          sed -i 's/\r$//' issues.csv

          tail -n +2 issues.csv | while IFS=',' read -r Title Description Phase Module Layer Priority
          do
            Title=$(echo "$Title" | xargs)
            Description=$(echo "$Description" | xargs)
            Phase=$(echo "$Phase" | xargs)
            Module=$(echo "$Module" | xargs)
            Layer=$(echo "$Layer" | xargs)
            Priority=$(echo "$Priority" | xargs)

            # -----------------------
            # Labels
            # -----------------------
            for LABEL in "$Layer" "$Priority"
            do
              if [ -n "$LABEL" ]; then
                gh label create "$LABEL" --color F29513 --force || true
                sleep 1
              fi
            done

            # -----------------------
            # Milestones
            # -----------------------
            if [ -n "$Phase" ]; then
              EXISTS=$(gh api repos/${{ github.repository }}/milestones --paginate --jq ".[] | select(.title==\"$Phase\") | .title")
              if [ -z "$EXISTS" ]; then
                gh api repos/${{ github.repository }}/milestones -f title="$Phase" || true
                sleep 1
              fi
            fi
          done

      - name: Import or Update Issues
        run: |
          tail -n +2 issues.csv | while IFS=',' read -r Title Description Phase Module Layer Priority
          do
            Title=$(echo "$Title" | xargs)
            Description=$(echo "$Description" | xargs)
            Phase=$(echo "$Phase" | xargs)
            Module=$(echo "$Module" | xargs)
            Layer=$(echo "$Layer" | xargs)
            Priority=$(echo "$Priority" | xargs)

            echo "Processing issue: $Title"

            # -----------------------
            # Get milestone number safely
            # -----------------------
            MILESTONE_NUMBER=$(gh api repos/${{ github.repository }}/milestones --jq ".[] | select(.title==\"$Phase\") | .number")
            if [ -z "$MILESTONE_NUMBER" ]; then
              echo "Milestone '$Phase' not found, skipping issue: $Title"
              continue
            fi

            BODY="### Module: $Module\n\n$Description\n\n**Phase:** $Phase\n**Layer:** $Layer\n**Priority:** $Priority"

            # -----------------------
            # Check if issue exists by title
            # -----------------------
            ISSUE_NUMBER=$(gh api repos/${{ github.repository }}/issues --jq ".[] | select(.title==\"$Title\") | .number")
            
            if [ -z "$ISSUE_NUMBER" ]; then
              echo "Creating issue: $Title"
              gh issue create \
                --title "$Title" \
                --body "$BODY" \
                --label "$Layer" \
                --label "$Priority" \
                --milestone "$MILESTONE_NUMBER" || true
              sleep 1
            else
              echo "Updating issue #$ISSUE_NUMBER"
              gh issue edit "$ISSUE_NUMBER" \
                --add-label "$Layer" \
                --add-label "$Priority" \
                --milestone "$MILESTONE_NUMBER" || true
              sleep 1
            fi
          done
