name: Import / Update Issues from CSV

on:
  workflow_dispatch:

permissions:
  issues: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install GitHub CLI and csvkit
        run: |
          sudo apt update
          sudo apt install -y gh jq python3-pip
          pip3 install csvkit

      - name: Authenticate GitHub CLI
        run: echo "${{ secrets.PAT_TOKEN }}" | gh auth login --with-token

      # ------------------------------------------------
      # Convert CSV to JSON for reliable parsing
      # ------------------------------------------------
      - name: Convert CSV to JSON
        run: |
          csvjson issues.csv > issues.json

      # ------------------------------------------------
      # Create Labels & Milestones (ensure exists)
      # ------------------------------------------------
      - name: Ensure Labels and Milestones Exist
        run: |
          jq -c '.[]' issues.json | while read ISSUE; do
            Title=$(echo "$ISSUE" | jq -r '.Title')
            Phase=$(echo "$ISSUE" | jq -r '.Phase')
            Layer=$(echo "$ISSUE" | jq -r '.Layer')
            Priority=$(echo "$ISSUE" | jq -r '.Priority')

            # Labels
            for LABEL in "$Layer" "$Priority"; do
              if [ "$LABEL" != "null" ] && [ -n "$LABEL" ]; then
                gh label create "$LABEL" --color F29513 --force || true
                sleep 1
              fi
            done

            # Milestone
            if [ "$Phase" != "null" ] && [ -n "$Phase" ]; then
              MILESTONE_EXISTS=$(gh api repos/${{ github.repository }}/milestones --paginate --jq ".[] | select(.title==\"$Phase\") | .title")
              if [ -z "$MILESTONE_EXISTS" ]; then
                echo "Creating milestone: $Phase"
                gh api repos/${{ github.repository }}/milestones -f title="$Phase" || true
                sleep 1
              fi
            fi
          done

      # ------------------------------------------------
      # Create or Update Issues (using milestone number)
      # ------------------------------------------------
      - name: Create or Update Issues
        run: |
          jq -c '.[]' issues.json | while read ISSUE; do
            Title=$(echo "$ISSUE" | jq -r '.Title')
            Description=$(echo "$ISSUE" | jq -r '.Description')
            Phase=$(echo "$ISSUE" | jq -r '.Phase')
            Module=$(echo "$ISSUE" | jq -r '.Module')
            Layer=$(echo "$ISSUE" | jq -r '.Layer')
            Priority=$(echo "$ISSUE" | jq -r '.Priority')

            BODY="### Module: $Module\n\n$Description\n\n**Phase:** $Phase\n**Layer:** $Layer\n**Priority:** $Priority"

            # Get milestone number safely
            MILESTONE_NUMBER=$(gh api repos/${{ github.repository }}/milestones --paginate --jq ".[] | select(.title==\"$Phase\") | .number")

            # Check if issue exists (exact match)
            ISSUE_NUMBER=$(gh api repos/${{ github.repository }}/issues --jq ".[] | select(.title==\"$Title\") | .number")

            if [ -z "$ISSUE_NUMBER" ]; then
              echo "Creating issue: $Title"
              if [ -n "$MILESTONE_NUMBER" ]; then
                gh issue create \
                  --title "$Title" \
                  --body "$BODY" \
                  --label "$Layer" \
                  --label "$Priority" \
                  --milestone "$MILESTONE_NUMBER" || true
              else
                gh issue create \
                  --title "$Title" \
                  --body "$BODY" \
                  --label "$Layer" \
                  --label "$Priority" || true
              fi
              sleep 1
            else
              echo "Updating issue #$ISSUE_NUMBER"
              if [ -n "$MILESTONE_NUMBER" ]; then
                gh issue edit "$ISSUE_NUMBER" \
                  --add-label "$Layer" \
                  --add-label "$Priority" \
                  --milestone "$MILESTONE_NUMBER" || true
              else
                gh issue edit "$ISSUE_NUMBER" \
                  --add-label "$Layer" \
                  --add-label "$Priority" || true
              fi
              sleep 1
            fi
          done
