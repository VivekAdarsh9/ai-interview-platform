name: Import / Update Issues from CSV

on:
  workflow_dispatch:

permissions:
  issues: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  import:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: |
          sudo apt update
          sudo apt install gh -y

      - name: Authenticate GitHub CLI
        run: echo "${{ secrets.PAT_TOKEN }}" | gh auth login --with-token

      # ------------------------------------------------
      # Create Labels Dynamically From CSV
      # ------------------------------------------------
      - name: Ensure Labels Exist
        run: |
          tail -n +2 issues.csv | while IFS=',' read -r Title Description Phase Layer Priority
          do
            if [ -n "$Layer" ]; then
              gh label create "$Layer" --color F29513 --force || true
            fi

            if [ -n "$Priority" ]; then
              gh label create "$Priority" --color B60205 --force || true
            fi
          done

      # ------------------------------------------------
      # Create Milestones Dynamically From CSV
      # ------------------------------------------------
      - name: Ensure Milestones Exist
        run: |
          tail -n +2 issues.csv | while IFS=',' read -r Title Description Phase Layer Priority
          do
            if [ -n "$Phase" ]; then
              EXISTS=$(gh api repos/${{ github.repository }}/milestones --paginate \
                --jq ".[] | select(.title==\"$Phase\") | .title")

              if [ -z "$EXISTS" ]; then
                echo "Creating milestone: $Phase"
                gh api repos/${{ github.repository }}/milestones -f title="$Phase"
              fi
            fi
          done

      # ------------------------------------------------
      # Remove Duplicate Issues
      # ------------------------------------------------
      - name: Remove Duplicate Issues
        run: |
          tail -n +2 issues.csv | while IFS=',' read -r Title Description Phase Layer Priority
          do
            echo "Checking duplicates for: $Title"

            ISSUES=$(gh issue list \
              --search "$Title in:title" \
              --json number,title,createdAt \
              --jq ".[] | select(.title==\"$Title\") | .number")

            COUNT=$(echo "$ISSUES" | wc -l)

            if [ "$COUNT" -gt 1 ]; then
              echo "Duplicate issues found for $Title"

              echo "$ISSUES" | tail -n +2 | while read DUP
              do
                echo "Deleting duplicate issue #$DUP"
                gh issue delete "$DUP" --yes
              done
            fi

          done

      # ------------------------------------------------
      # Create or Update Issues
      # ------------------------------------------------
      - name: Import or Update Issues
        run: |
          tail -n +2 issues.csv | while IFS=',' read -r Title Description Phase Layer Priority
          do
            echo "Processing: $Title"

            ISSUE_NUMBER=$(gh issue list \
              --search "$Title in:title" \
              --json number,title \
              --jq ".[] | select(.title==\"$Title\") | .number")

            BODY="$Description\n\nPhase: $Phase\nLayer: $Layer\nPriority: $Priority"

            if [ -z "$ISSUE_NUMBER" ]; then
              echo "Creating issue: $Title"

              gh issue create \
                --title "$Title" \
                --body "$BODY" \
                --label "$Layer" \
                --label "$Priority" \
                --milestone "$Phase"

            else
              echo "Updating issue #$ISSUE_NUMBER"

              gh issue edit "$ISSUE_NUMBER" \
                --add-label "$Layer" \
                --add-label "$Priority" \
                --milestone "$Phase"
            fi

          done
